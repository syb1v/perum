name: perum-core

services:
  perum_core:
    build:
      context: ../perum-core
    image: perum-core:dev
    # Build locally; never try to pull this image from a registry.
    pull_policy: build
    container_name: perum_core
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://perum:perum@perum_control_db:5432/perum_control
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CADDY_ADMIN_URL: http://caddy:2019
      CONTROL_PLANE_URL: http://perum_core:3000
      TENANT_IMAGE: ${TENANT_IMAGE:-perum-tenant:dev}
      IMAGE_REGISTRY: ${IMAGE_REGISTRY:-docker.io}
      SHARED_REDIS_URL: redis://shared_redis:6379
      DOCKER_NETWORK: perum_internal
      PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-perum.local}
      # First platform admin, seeded on startup if no admins exist yet.
      # Dev default is admin/admin — OVERRIDE in prod via .env.
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin}
      # Hardening (Фаза 10): шифрование секретов at-rest, защита /metrics.
      # Пусто (dev) → плейнтекст/открыто; в проде задать через .env.
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      perum_control_db:
        condition: service_healthy
      shared_redis:
        condition: service_started
    networks:
      - perum_internal
    volumes:
      # Control plane provisions per-org stacks by talking to the host Docker
      # daemon. This grants perum_core root-equivalent control over Docker on
      # the host — inherent to the silo-per-org architecture.
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 3000 --proxy-headers --forwarded-allow-ips=*

  perum_control_db:
    image: ${IMAGE_REGISTRY:-docker.io}/library/postgres:15-alpine
    container_name: perum_control_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: perum
      POSTGRES_PASSWORD: perum
      POSTGRES_DB: perum_control
    volumes:
      - perum_control_data:/var/lib/postgresql/data
    networks:
      - perum_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perum -d perum_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  perum_web:
    build:
      context: ../perum-web
      args:
        NODE_IMAGE: ${IMAGE_REGISTRY:-docker.io}/library/node:20-alpine
    image: perum-web:dev
    pull_policy: build
    container_name: perum_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - perum_internal

  shared_redis:
    image: ${IMAGE_REGISTRY:-docker.io}/library/redis:7-alpine
    container_name: shared_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - perum_internal

  caddy:
    image: ${IMAGE_REGISTRY:-docker.io}/library/caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - perum_internal

  # --- Observability (Фаза 9): Prometheus скребёт ядро, Grafana визуализирует ---
  prometheus:
    image: ${IMAGE_REGISTRY:-docker.io}/prom/prometheus:latest
    container_name: perum_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - perum_internal

  grafana:
    image: ${IMAGE_REGISTRY:-docker.io}/grafana/grafana:latest
    container_name: perum_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - perum_internal

volumes:
  perum_control_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  perum_internal:
    name: perum_internal
    driver: bridge
