name: perum-core

services:
  perum_core:
    build:
      context: ../perum-core
    image: ${CORE_IMAGE:-perum-core:dev}
    pull_policy: ${CORE_PULL_POLICY:-build}
    container_name: perum_core
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://perum:${CONTROL_DB_PASSWORD:-perum}@perum_control_db:5432/perum_control
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      BACKUP_DIR: /backups
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CADDY_ADMIN_URL: http://caddy:2019
      CONTROL_PLANE_URL: http://perum_core:3000
      TENANT_IMAGE: ${TENANT_IMAGE:-perum-tenant:dev}
      IMAGE_REGISTRY: ${IMAGE_REGISTRY:-docker.io}
      SHARED_REDIS_URL: redis://shared_redis:6379
      DOCKER_NETWORK: perum_internal
      # #7: ядро НЕ монтирует сырой docker.sock. Все docker-операции идут через
      # фильтрующий docker_proxy по TCP (docker.from_env() honor-ит DOCKER_HOST).
      # Компрометация ядра больше не даёт прямого root-доступа к демону хоста.
      DOCKER_HOST: tcp://docker_proxy:2375
      PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-perum.local}
      # First platform admin, seeded on startup if no admins exist yet.
      # Dev default is admin/admin — OVERRIDE in prod via .env.
      BOOTSTRAP_ADMIN_LOGIN: ${BOOTSTRAP_ADMIN_LOGIN:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin}
      # Hardening (Фаза 10): шифрование секретов at-rest, защита /metrics.
      # Пусто (dev) → плейнтекст/открыто; в проде задать через .env.
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      perum_control_db:
        condition: service_healthy
      shared_redis:
        condition: service_started
      docker_proxy:
        condition: service_started
    networks:
      - perum_internal
    volumes:
      # #7: docker.sock больше НЕ монтируется в ядро — доступ к демону только через
      # фильтрующий docker_proxy (см. DOCKER_HOST выше). Остаётся только том бэкапов.
      # Авто-бэкап БД/вложений школы перед безвозвратным удалением (purge).
      - perum_backups:/backups
    command:
      - sh
      - -c
      - |
        alembic upgrade head &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 3000 --proxy-headers --forwarded-allow-ips=*

  # #7: единственный сервис с доступом к docker.sock хоста. Фильтрует Docker API
  # (haproxy): ядру разрешены только контейнеры/образы/тома/сети/exec, остальные
  # ручки демона (swarm/secrets/system/…) закрыты. Сокет смонтирован read-only.
  # На прод-сервере образ предзагружен (docker save|load) — pull не требуется.
  docker_proxy:
    image: tecnativa/docker-socket-proxy:0.3
    pull_policy: missing
    container_name: perum_docker_proxy
    restart: unless-stopped
    environment:
      # Нужные ядру ручки (provision/suspend/update/backup школьных стеков):
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      NETWORKS: 1
      EXEC: 1
      POST: 1          # без этого прокси read-only (create/start/exec невозможны)
      VERSION: 1       # docker-py согласует версию API при подключении
      PING: 1
      # Явно закрытое (и так закрыто по умолчанию, фиксируем намерение):
      INFO: 0
      SWARM: 0
      SECRETS: 0
      CONFIGS: 0
      SERVICES: 0
      NODES: 0
      SYSTEM: 0
      AUTH: 0
      DISTRIBUTION: 0
      PLUGINS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - perum_internal

  perum_control_db:
    image: ${IMAGE_REGISTRY:-docker.io}/library/postgres:15-alpine
    container_name: perum_control_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: perum
      POSTGRES_PASSWORD: ${CONTROL_DB_PASSWORD:-perum}
      POSTGRES_DB: perum_control
    volumes:
      - perum_control_data:/var/lib/postgresql/data
    networks:
      - perum_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perum -d perum_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  perum_web:
    build:
      context: ../perum-web
      args:
        NODE_IMAGE: ${IMAGE_REGISTRY:-docker.io}/library/node:20-alpine
        # Апекс-домен ядра (лендинг) vs кастомный домен школы — middleware/host.ts.
        NEXT_PUBLIC_BASE_DOMAIN: ${PUBLIC_BASE_DOMAIN:-perum.local}
    image: ${WEB_IMAGE:-perum-web:dev}
    pull_policy: ${WEB_PULL_POLICY:-build}
    container_name: perum_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - perum_internal

  shared_redis:
    image: ${IMAGE_REGISTRY:-docker.io}/library/redis:7-alpine
    container_name: shared_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - perum_internal

  caddy:
    image: ${IMAGE_REGISTRY:-docker.io}/library/caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - perum_internal

  # --- Observability (Фаза 9): Prometheus скребёт ядро, Grafana визуализирует ---
  prometheus:
    image: ${IMAGE_REGISTRY:-docker.io}/prom/prometheus:latest
    container_name: perum_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Bearer-токен для скрейпа /metrics (вне VCS; создаётся на сервере из
      # METRICS_TOKEN). Файл может отсутствовать в dev — тогда токен пустой.
      - ./observability/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    networks:
      - perum_internal

  grafana:
    image: ${IMAGE_REGISTRY:-docker.io}/grafana/grafana:latest
    container_name: perum_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - perum_internal

volumes:
  perum_control_data:
  perum_backups:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:

networks:
  perum_internal:
    name: perum_internal
    driver: bridge
