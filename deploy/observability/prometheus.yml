global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Ядро PERUM — метрики на /metrics (напрямую по внутренней сети, минуя Caddy).
  - job_name: perum_core
    metrics_path: /metrics
    static_configs:
      - targets: ["perum_core:3000"]
        labels:
          service: perum-core
