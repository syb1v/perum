name: Release (build & push images)

# Публикация образов в GHCR по git-тегу vX.Y.Z. Затем platform_admin публикует
# релиз в ядре (POST /api/releases с image=ghcr.io/<owner>/perum-tenant:X.Y.Z),
# и организации обновляют школы «по кнопке» (OTA). См. docs/RUNBOOK.md.

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: perum-core
            context: perum-core
          - image: perum-tenant
            context: perum-tenant
          - image: perum-web
            context: perum-web
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest
